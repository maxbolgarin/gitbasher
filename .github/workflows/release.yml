name: Release

on:
  workflow_dispatch:

# Even though releases only fire on manual dispatch, guard against
# accidental concurrent runs (rapid double-click on "Run workflow") so we
# never half-publish a tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build release asset
        run: |
          ./dist/build.sh ./scripts/gitb.sh ./dist/gitb
          chmod +x ./dist/gitb

      - name: Verify release asset exists
        run: |
          if [ ! -f "dist/gitb" ]; then
            echo "Error: dist/gitb not found after build"
            exit 1
          fi
          if [ ! -x "dist/gitb" ]; then
            echo "Error: dist/gitb is not executable"
            exit 1
          fi
          echo "Release asset verified: dist/gitb"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install semantic-release
        # Plugins live in devDependencies (package.json). `npm install` resolves them
        # locally; `npx semantic-release` below picks them up from ./node_modules/.bin.
        run: npm install --no-audit --no-fund

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
