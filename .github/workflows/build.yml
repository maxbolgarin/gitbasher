name: Build and Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Catches real bugs (unquoted vars, incorrect test ops, GNU-only flags) without
      # blocking on style warnings. Severity can be widened to "warning" later once
      # the existing baseline is clean.
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: ./scripts
          additional_files: install.sh

  build:
    needs: shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: echo "version=$(git describe --tags --always 2>/dev/null | sed 's/^v//' || echo 'dev')" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          ./dist/build.sh ./scripts/gitb.sh ./dist/gitb "${{ steps.version.outputs.version }}"
          chmod +x ./dist/gitb

      - name: Install BATS (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install BATS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core bash

      - name: Run BATS Tests
        run: |
          cd tests
          if [ "$RUNNER_OS" = "macOS" ]; then
            export PATH="$(brew --prefix bash)/bin:$PATH"
          fi
          bash --version
          bats *.bats

      - name: Smoke Test
        run: ./dist/gitb; if [ $? -ne 0 ]; then exit 1; fi

  coverage:
    needs: build
    # noble (24.04) dropped kcov from the apt repos — pin to jammy where it ships.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS and kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y bats kcov

      # Run each .bats file under kcov so coverage data merges across files.
      # --include-path scopes coverage to the source we actually ship.
      # install.sh is the curl/wget bootstrap — it runs once outside CI and
      # every branch shells out to apt/brew, so it's excluded from coverage.
      # --exclude-region brackets blocks unsuited to unit tests (network curl
      # wrappers, completion heredocs, help-text printers); --exclude-line
      # drops single noisy lines (color constants, version-banner prints).
      - name: Run BATS under kcov
        run: |
          mkdir -p coverage
          for f in tests/*.bats; do
            kcov --include-path=scripts \
                 --exclude-region='kcov-skip-start,kcov-skip-end' \
                 --exclude-line='kcov-skip-line' \
                 --bash-dont-parse-binary-dir \
                 "coverage/$(basename "$f" .bats)" \
                 bats "$f" || true
          done
          # Merge into a single report
          kcov --merge coverage/merged coverage/test_*

      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bash-coverage
          path: coverage/merged
          retention-days: 14

      # kcov writes cobertura.xml inside the merged dir. Codecov accepts it
      # tokenless for public repos and powers the README badge.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/merged/cobertura.xml
          flags: bash
          fail_ci_if_error: false
