name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Catches real bugs (unquoted vars, incorrect test ops, GNU-only flags) without
      # blocking on style warnings. Severity can be widened to "warning" later once
      # the existing baseline is clean. dist/build.sh is included so the bundler
      # itself is held to the same bar as the scripts it bundles.
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: ./scripts
          additional_files: install.sh dist/build.sh

  lint-config:
    # Catch syntax errors in YAML / JSON config before they break a release.
    # actionlint surfaces workflow-level mistakes (bad `if:` expressions,
    # undefined inputs, deprecated syntax); jq -e validates parseability.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package.json and .releaserc.json
        run: |
          jq -e . package.json > /dev/null
          jq -e . .releaserc.json > /dev/null

      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  security-scan:
    # Surface committed secrets early. We don't run `npm audit` because the
    # bundled gitb has no Node runtime — semantic-release deps are dev-only,
    # pulled fresh in CI, and never reach end users.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-dry-run:
    # PR-only: validates that .releaserc.json + Conventional Commits parse
    # cleanly and would produce a coherent release. Catches plugin config
    # errors before they hit main and break the actual release workflow.
    if: github.event_name == 'pull_request'
    needs: lint-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install semantic-release
        run: npm install --no-audit --no-fund

      - name: semantic-release --dry-run
        env:
          # `--dry-run` doesn't publish, but plugins still demand a token.
          # GITHUB_TOKEN is enough; NPM_TOKEN is intentionally not set to
          # ensure the dry run can never reach npm even if a plugin slips.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run --no-ci

  build:
    needs: shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: echo "version=$(git describe --tags --always 2>/dev/null | sed 's/^v//' || echo 'dev')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          ./dist/build.sh ./scripts/gitb.sh ./dist/gitb "${{ steps.version.outputs.version }}"
          chmod +x ./dist/gitb

      - name: Install BATS (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install BATS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core bash

      - name: Run BATS Tests
        run: |
          cd tests
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew_bash="$(brew --prefix bash)"
            export PATH="$brew_bash/bin:$PATH"
          fi
          bash --version
          bats ./*.bats

      - name: Smoke Test
        run: ./dist/gitb

  bash32:
    # The real bash 3.2 gate. macOS ships /bin/bash 3.2.57 (the oldest bash we
    # support), so run the whole suite under it — WITHOUT prepending Homebrew's
    # bash to PATH — to prove gitbasher works without any bash 4+ feature.
    needs: shellcheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify we are on system bash 3.2
        run: |
          /bin/bash --version | head -1
          /bin/bash -c 'major=${BASH_VERSINFO[0]}; minor=${BASH_VERSINFO[1]}; \
            echo "system bash: $major.$minor"; \
            if [ "$major" -ne 3 ] || [ "$minor" -ne 2 ]; then \
              echo "Expected /bin/bash to be 3.2 on the macOS runner"; exit 1; fi'

      - name: Build (under bash 3.2)
        run: |
          version=$(git describe --tags --always 2>/dev/null | sed 's/^v//' || echo 'dev')
          /bin/bash ./dist/build.sh ./scripts/gitb.sh ./dist/gitb "$version"
          chmod +x ./dist/gitb

      - name: Install BATS
        run: brew install bats-core

      - name: Run BATS suite under system bash 3.2
        # Force every `#!/usr/bin/env bash` (bats itself and its helpers) to
        # resolve to the system bash 3.2 by putting a symlink first on PATH.
        # The macOS image may already carry a Homebrew bash 5 on PATH, so this
        # guarantees the suite genuinely exercises 3.2.
        run: |
          mkdir -p "$RUNNER_TEMP/bin32"
          ln -sf /bin/bash "$RUNNER_TEMP/bin32/bash"
          export PATH="$RUNNER_TEMP/bin32:$PATH"
          bash --version | head -1
          bash -c '[ "${BASH_VERSINFO[0]}" -eq 3 ] || { echo "not bash 3.x"; exit 1; }'
          cd tests
          bats ./*.bats

      - name: Smoke test bundled gitb under bash 3.2
        run: |
          /bin/bash ./dist/gitb version
          /bin/bash ./dist/gitb help
